<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{TITLE}}</title>
		{{CHARTJS_SCRIPT}}
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
					Arial, sans-serif;
				background: #1a1a2e;
				color: #e0e0e0;
				padding: 2rem;
				line-height: 1.6;
			}
			h1 {
				color: #ffffff;
				margin-bottom: 0.25rem;
				font-size: 1.6rem;
			}
			.subtitle {
				color: #8888aa;
				font-size: 0.85rem;
				margin-bottom: 1.5rem;
			}
			h2 {
				color: #c0c0e0;
				margin: 1.5rem 0 0.75rem;
				font-size: 1.15rem;
				border-bottom: 1px solid #333355;
				padding-bottom: 0.3rem;
			}
			.chart-container {
				background: #16213e;
				border-radius: 8px;
				padding: 1rem;
				margin-bottom: 1.5rem;
				border: 1px solid #2a2a4a;
			}
			table {
				width: 100%;
				border-collapse: collapse;
				background: #16213e;
				border-radius: 8px;
				overflow: hidden;
				border: 1px solid #2a2a4a;
				margin-bottom: 1.5rem;
			}
			th,
			td {
				padding: 0.6rem 0.8rem;
				text-align: left;
			}
			th {
				background: #0f3460;
				color: #aaccff;
				font-weight: 600;
				font-size: 0.8rem;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			td {
				border-top: 1px solid #2a2a4a;
				font-size: 0.9rem;
			}
			tr:hover td {
				background: #1a2744;
			}
			.num {
				text-align: right;
				font-variant-numeric: tabular-nums;
			}
			.narrative p {
				margin-bottom: 0.75rem;
			}
			.narrative strong {
				color: #ffffff;
			}
			.narrative ul {
				margin: 0.5rem 0 0.75rem 1.5rem;
			}
			.narrative li {
				margin-bottom: 0.3rem;
			}
			.footer {
				margin-top: 2rem;
				color: #555577;
				font-size: 0.75rem;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<h1>{{TITLE}}</h1>
		<div class="subtitle">Generated at {{GENERATED_AT}}</div>

		<h2>Spend by Ad</h2>
		<div class="chart-container">
			<canvas id="spendChart"></canvas>
		</div>

		<div id="trendSection" style="display: none">
			<h2>Daily Spend Trend</h2>
			<div class="chart-container">
				<canvas id="trendChart"></canvas>
			</div>
		</div>

		<h2>Ad Performance Table</h2>
		{{TABLE_HTML}}

		<h2>Analysis</h2>
		<div class="narrative">{{NARRATIVE_HTML}}</div>

		<div class="footer">
			Meta Ads Report — generated by Local Research Agent
		</div>

		{{CHARTS_SCRIPT}}
	</body>
</html>
